<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Inquérito aos Novos Estudantes Iscte 2026 - Registo de Iniciativas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header-info {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .month-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .month-selector button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .month-selector button:hover {
            background: #764ba2;
        }

        .month-selector h2 {
            color: #333;
            font-size: 24px;
            min-width: 200px;
            text-align: center;
        }

        .multi-select-toolbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .multi-select-btn {
            background: #FF9800;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .multi-select-btn:hover {
            background: #F57C00;
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
        }

        .multi-select-btn.active {
            background: #F57C00;
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.3);
        }

        .multi-select-status {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .calendar {
            margin-bottom: 30px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: bold;
            color: #667eea;
            padding: 10px;
            font-size: 14px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day {
            aspect-ratio: 1;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
            min-height: 80px;
        }

        .day:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            background: #f8f9ff;
        }

        .day.other-month {
            background: #f5f5f5;
            color: #ccc;
            cursor: default;
        }

        .day.other-month:hover {
            border-color: #e0e0e0;
            box-shadow: none;
            background: #f5f5f5;
        }

        .day.has-activity {
            border-color: #4CAF50;
            background: #f1f8f4;
        }

        .day.has-activity:hover {
            border-color: #4CAF50;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .day.is-vacation {
            border-color: #2196F3;
            background: #e3f2fd;
        }

        .day.is-vacation:hover {
            border-color: #2196F3;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        .day.is-vacation .day-number {
            color: #1976D2;
            font-weight: bold;
        }

        .day.is-vacation .day-number::before {
            content: '🏖 ';
        }

        .day.selected {
            border: 3px solid #FF9800;
            background: #fff3e0;
            box-shadow: 0 0 0 2px #FF9800;
        }

        .day.selected:hover {
            border-color: #FF9800;
            box-shadow: 0 0 0 2px #FF9800;
        }

        .day-number {
            font-weight: bold;
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .day.other-month .day-number {
            color: #ccc;
        }

        .day-activities {
            font-size: 11px;
            color: #666;
            overflow: hidden;
            flex: 1;
            line-height: 1.3;
        }

        .activity-item {
            background: #e8f5e9;
            padding: 2px 4px;
            border-radius: 3px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .day-activity-indicator {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: #333;
            font-size: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
            transition: border-color 0.3s;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-save {
            background: #4CAF50;
            color: white;
        }

        .btn-save:hover {
            background: #45a049;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #da190b;
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #bdbdbd;
        }

        .activities-list {
            margin-top: 20px;
            border-top: 2px solid #e0e0e0;
            padding-top: 15px;
        }

        .activities-list h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .activity-entry {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            line-height: 1.4;
        }

        .activity-text {
            flex: 1;
            color: #333;
            word-break: break-word;
        }

        .activity-delete-btn {
            background: #ffebee;
            border: none;
            color: #f44336;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
            flex-shrink: 0;
        }

        .activity-delete-btn:hover {
            background: #ffcdd2;
        }

        .empty-message {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .vacation-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #e3f2fd;
            border-radius: 6px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .vacation-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2196F3;
        }

        .vacation-checkbox label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
            color: #1976D2;
        }

        .multi-select-modal-content {
            display: none;
        }

        .multi-select-modal-content.active {
            display: block;
        }

        .selected-dates-list {
            background: #fff3e0;
            border: 2px solid #FF9800;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .selected-dates-list h4 {
            color: #FF9800;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .date-tag {
            display: inline-block;
            background: #FF9800;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 2px;
            font-size: 12px;
        }

        .multi-action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-vacation-multi {
            background: #2196F3;
            color: white;
        }

        .btn-vacation-multi:hover {
            background: #1976D2;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 22px;
            }

            .month-selector {
                flex-direction: column;
                gap: 15px;
            }

            .modal-content {
                width: 95%;
            }

            .day {
                min-height: 60px;
                padding: 8px;
            }

            .day-number {
                font-size: 14px;
            }

            .day-activities {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Calendário Inquérito aos Novos Estudantes do Iscte 2026</h1>
        <p class="header-info">Registo de Iniciativas</p>

        <div class="month-selector">
            <button id="prevBtn" onclick="previousMonth()">← Anterior</button>
            <h2 id="monthYear"></h2>
            <button id="nextBtn" onclick="nextMonth()">Próximo →</button>
        </div>

        <div class="multi-select-toolbar" id="multiSelectToolbar" style="display: none;">
            <button class="multi-select-btn" onclick="toggleMultiSelect()">❌ Sair do Modo Seleção</button>
            <span class="multi-select-status">Clica nos dias para selecionar</span>
            <span id="selectedCount" class="multi-select-status" style="font-weight: bold; color: #FF9800;"></span>
            <button class="multi-select-btn" id="applyMultiBtn" onclick="openMultiSelectModal()" style="display: none; background: #FF9800;">✅ Aplicar</button>
        </div>

        <div class="multi-select-toolbar" id="multiSelectButtonBar" style="justify-content: center;">
            <button class="multi-select-btn" onclick="toggleMultiSelect()">🖱️ Seleção Múltipla (Férias)</button>
        </div>

        <div class="calendar">
            <div class="weekdays">
                <div class="weekday">Dom</div>
                <div class="weekday">Seg</div>
                <div class="weekday">Ter</div>
                <div class="weekday">Qua</div>
                <div class="weekday">Qui</div>
                <div class="weekday">Sex</div>
                <div class="weekday">Sab</div>
            </div>
            <div class="days" id="daysContainer"></div>
        </div>
    </div>

    <!-- Modal para editar atividades -->
    <div id="activityModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Atividades</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>

            <div class="vacation-checkbox">
                <input type="checkbox" id="vacationCheckbox" onchange="toggleVacation()">
                <label for="vacationCheckbox">Marcar como férias</label>
            </div>

            <div class="form-group">
                <label for="activityInput">Nova atividade:</label>
                <textarea id="activityInput" placeholder="Ex: Abrir inscrições no Fénix+"></textarea>
            </div>

            <div class="modal-buttons" style="margin-bottom: 0;">
                <button class="btn btn-save" onclick="addActivity()">+ Adicionar</button>
                <button class="btn btn-cancel" onclick="closeModal()">Fechar</button>
            </div>

            <div class="activities-list" id="activitiesList"></div>
        </div>
    </div>

    <!-- Modal para seleção múltipla -->
    <div id="multiSelectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Férias para Múltiplos Dias</h2>
                <button class="close-btn" onclick="closeMultiSelectModal()">&times;</button>
            </div>

            <div class="selected-dates-list">
                <h4>Dias selecionados:</h4>
                <div id="selectedDatesList"></div>
            </div>

            <div class="form-group">
                <label for="multiActivityInput">Atividade para todos os dias:</label>
                <textarea id="multiActivityInput" placeholder="Ex: Férias - Período de descanso"></textarea>
            </div>

            <div class="multi-action-buttons">
                <button class="btn btn-vacation-multi" onclick="applyVacationToMultiDays()">🏖️ Marcar como Férias</button>
                <button class="btn btn-save" onclick="addActivityToMultiDays()">➕ Adicionar Atividade</button>
                <button class="btn btn-cancel" onclick="clearMultiSelection()" style="grid-column: 1 / -1;">🗑️ Limpar Seleção</button>
            </div>

            <div class="modal-buttons" style="margin-top: 20px;">
                <button class="btn btn-cancel" onclick="closeMultiSelectModal()">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date(2026, 3, 1); // Começa em Abril de 2026
        let selectedDate = null;
        let multiSelectMode = false;
        let selectedDates = [];

        // Carrega dados do localStorage
        function loadActivities() {
            const data = localStorage.getItem('calendarActivities');
            return data ? JSON.parse(data) : {};
        }

        // Guarda dados no localStorage
        function saveActivities(activities) {
            localStorage.setItem('calendarActivities', JSON.stringify(activities));
        }

        // Carrega férias
        function loadVacations() {
            const data = localStorage.getItem('calendarVacations');
            return data ? JSON.parse(data) : [];
        }

        // Guarda férias
        function saveVacations(vacations) {
            localStorage.setItem('calendarVacations', JSON.stringify(vacations));
        }

        // Formata a chave da data
        function getDateKey(date) {
            return date.toISOString().split('T')[0];
        }

        // Renderiza o calendário
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // Atualiza o título
            const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                              'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            document.getElementById('monthYear').textContent = `${monthNames[month]} de ${year}`;

            // Obtém o primeiro dia do mês
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const prevLastDay = new Date(year, month, 0);

            const firstDayOfWeek = firstDay.getDay();
            const daysInMonth = lastDay.getDate();
            const daysInPrevMonth = prevLastDay.getDate();

            let daysHtml = '';
            const activities = loadActivities();
            const vacations = loadVacations();

            // Dias do mês anterior
            for (let i = firstDayOfWeek - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                daysHtml += `<div class="day other-month"><div class="day-number">${day}</div></div>`;
            }

            // Dias do mês atual
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateKey = getDateKey(date);
                const dayActivities = activities[dateKey] || [];
                const hasActivity = dayActivities.length > 0;
                const isVacation = vacations.includes(dateKey);
                const isSelected = selectedDates.includes(dateKey);

                let activitiesHtml = '';
                dayActivities.forEach(activity => {
                    activitiesHtml += `<div class="activity-item" title="${activity}">${activity}</div>`;
                });

                const activityIndicator = hasActivity ? '<div class="day-activity-indicator"></div>' : '';

                daysHtml += `
                    <div class="day ${hasActivity ? 'has-activity' : ''} ${isVacation ? 'is-vacation' : ''} ${isSelected ? 'selected' : ''}" onclick="handleDayClick(new Date(${year}, ${month}, ${day}))">
                        ${activityIndicator}
                        <div class="day-number">${day}</div>
                        <div class="day-activities">${activitiesHtml}</div>
                    </div>
                `;
            }

            // Dias do próximo mês
            const daysToShow = 42 - (firstDayOfWeek + daysInMonth);
            for (let day = 1; day <= daysToShow; day++) {
                daysHtml += `<div class="day other-month"><div class="day-number">${day}</div></div>`;
            }

            document.getElementById('daysContainer').innerHTML = daysHtml;
        }

        // Abre o modal de atividades
        function openActivityModal(date) {
            selectedDate = date;
            const dateKey = getDateKey(date);
            const activities = loadActivities();
            const vacations = loadVacations();
            const dayActivities = activities[dateKey] || [];
            const isVacation = vacations.includes(dateKey);

            const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                              'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            const dayNames = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];

            const dateStr = `${date.getDate()} de ${monthNames[date.getMonth()]} de ${date.getFullYear()}`;
            const dayName = dayNames[date.getDay()];

            document.getElementById('modalTitle').textContent = `${dayName}, ${dateStr}`;
            document.getElementById('vacationCheckbox').checked = isVacation;
            document.getElementById('activityInput').value = '';

            // Renderiza lista de atividades
            let activitiesListHtml = '';
            if (dayActivities.length > 0) {
                activitiesListHtml = '<h3>Atividades registadas:</h3>';
                dayActivities.forEach((activity, index) => {
                    activitiesListHtml += `
                        <div class="activity-entry">
                            <div class="activity-text">• ${activity}</div>
                            <button class="activity-delete-btn" onclick="deleteActivity(${index})">Remover</button>
                        </div>
                    `;
                });
            } else {
                activitiesListHtml = '<div class="empty-message">Sem atividades registadas</div>';
            }

            document.getElementById('activitiesList').innerHTML = activitiesListHtml;

            document.getElementById('activityModal').style.display = 'block';
        }

        // Adiciona uma atividade
        function addActivity() {
            const input = document.getElementById('activityInput');
            const activity = input.value.trim();

            if (!activity) {
                alert('Por favor, escreve uma atividade!');
                return;
            }

            const dateKey = getDateKey(selectedDate);
            const activities = loadActivities();

            if (!activities[dateKey]) {
                activities[dateKey] = [];
            }

            activities[dateKey].push(activity);
            saveActivities(activities);

            input.value = '';
            renderCalendar();
            openActivityModal(selectedDate);
        }

        // Deleta uma atividade
        function deleteActivity(index) {
            const dateKey = getDateKey(selectedDate);
            const activities = loadActivities();

            if (activities[dateKey]) {
                activities[dateKey].splice(index, 1);
                saveActivities(activities);
                renderCalendar();
                openActivityModal(selectedDate);
            }
        }

        // Toggle férias
        function toggleVacation() {
            const dateKey = getDateKey(selectedDate);
            const vacations = loadVacations();
            const index = vacations.indexOf(dateKey);

            if (index > -1) {
                vacations.splice(index, 1);
            } else {
                vacations.push(dateKey);
            }

            saveVacations(vacations);
            renderCalendar();
            openActivityModal(selectedDate);
        }

        // Fecha o modal
        function closeModal() {
            document.getElementById('activityModal').style.display = 'none';
            selectedDate = null;
        }

        // Toggle modo seleção múltipla
        function toggleMultiSelect() {
            multiSelectMode = !multiSelectMode;
            document.getElementById('multiSelectToolbar').style.display = multiSelectMode ? 'flex' : 'none';
            document.getElementById('multiSelectButtonBar').style.display = multiSelectMode ? 'none' : 'flex';
            
            if (!multiSelectMode) {
                clearMultiSelection();
            } else {
                updateSelectedCount();
            }
            
            renderCalendar();
        }

        // Handle clique num dia
        function handleDayClick(date) {
            if (multiSelectMode) {
                toggleDateSelection(date);
            } else {
                openActivityModal(date);
            }
        }

        // Toggle seleção de uma data
        function toggleDateSelection(date) {
            const dateKey = getDateKey(date);
            const index = selectedDates.indexOf(dateKey);
            
            if (index > -1) {
                selectedDates.splice(index, 1);
            } else {
                selectedDates.push(dateKey);
            }
            
            updateSelectedCount();
            renderCalendar();
        }

        // Atualiza o contador de dias selecionados
        function updateSelectedCount() {
            const count = selectedDates.length;
            const countEl = document.getElementById('selectedCount');
            const applyBtn = document.getElementById('applyMultiBtn');
            
            if (count > 0) {
                countEl.textContent = `${count} dia(s) selecionado(s)`;
                applyBtn.style.display = 'block';
            } else {
                countEl.textContent = '';
                applyBtn.style.display = 'none';
            }
        }

        // Aplicar férias a múltiplos dias
        function applyVacationToMultiDays() {
            const vacations = loadVacations();
            
            selectedDates.forEach(dateKey => {
                if (!vacations.includes(dateKey)) {
                    vacations.push(dateKey);
                }
            });
            
            saveVacations(vacations);
            clearMultiSelection();
            closeMultiSelectModal();
            renderCalendar();
            alert('✅ Férias marcadas para ' + selectedDates.length + ' dia(s)!');
        }

        // Adicionar atividade a múltiplos dias
        function addActivityToMultiDays() {
            const input = document.getElementById('multiActivityInput');
            const activity = input.value.trim();
            
            if (!activity) {
                alert('Por favor, escreve uma atividade!');
                return;
            }
            
            const activities = loadActivities();
            
            selectedDates.forEach(dateKey => {
                if (!activities[dateKey]) {
                    activities[dateKey] = [];
                }
                activities[dateKey].push(activity);
            });
            
            saveActivities(activities);
            input.value = '';
            clearMultiSelection();
            closeMultiSelectModal();
            renderCalendar();
            alert('✅ Atividade adicionada a ' + selectedDates.length + ' dia(s)!');
        }

        // Limpar seleção múltipla
        function clearMultiSelection() {
            selectedDates = [];
            updateSelectedCount();
            renderCalendar();
        }

        // Abre/Fecha modal de seleção múltipla
        function openMultiSelectModal() {
            if (selectedDates.length === 0) {
                alert('Por favor, seleciona pelo menos um dia!');
                return;
            }
            
            // Renderiza lista de datas selecionadas
            const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                              'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            
            let datesHtml = '';
            selectedDates.sort().forEach(dateKey => {
                const date = new Date(dateKey + 'T00:00:00');
                const dateStr = `${date.getDate()} ${monthNames[date.getMonth()]}`;
                datesHtml += `<span class="date-tag">${dateStr}</span>`;
            });
            
            document.getElementById('selectedDatesList').innerHTML = datesHtml;
            document.getElementById('multiActivityInput').value = '';
            document.getElementById('multiSelectModal').style.display = 'block';
        }

        function closeMultiSelectModal() {
            document.getElementById('multiSelectModal').style.display = 'none';
        }

        // Navega para o mês anterior
        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        // Navega para o próximo mês
        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        // Fecha o modal ao clicar fora dele
        window.onclick = function(event) {
            const modal = document.getElementById('activityModal');
            const multiModal = document.getElementById('multiSelectModal');
            
            if (event.target === modal) {
                closeModal();
            }
            if (event.target === multiModal) {
                closeMultiSelectModal();
            }
        }

        // Inicializa
        renderCalendar();
    </script>
</body>
</html>
